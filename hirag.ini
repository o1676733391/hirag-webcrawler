# HiRAG runner config (key=value)
input_dir=demo_rag
working_dir=hirag_fullcontext_workdir
limit=0
env_file=.env

# OpenAI settings
openai_api_key=
openai_base_url=
chat_model=gpt-4o-mini
embedding_model=text-embedding-3-small
embedding_dim=1536

# HiRAG settings
enable_llm_cache=true
enable_hierachical_mode=true
enable_naive_rag=false
embedding_batch_num=6
embedding_func_max_async=8
